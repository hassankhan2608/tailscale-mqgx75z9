services:
  - type: worker
    name: render-subnet-router
    env: docker
    autoDeploy: false
    envVars:
      - key: TAILSCALE_AUTHKEY
        sync: false
      - key: TAILSCALE_VERSION
        value: 1.96.4
      - key: ADVERTISE_ROUTES
        value: 10.0.0.0/8
      - key: TS_EXTRA_ARGS
        value: "--ssh --accept-dns --accept-routes"
    disk:
      name: tailscale-state
      mountPath: /var/lib/tailscale
      sizeGB: 1

